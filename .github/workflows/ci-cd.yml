name: CI/CD — Procurement Management System

on:
  push:
    branches: [main, dev, dev-temp]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/procurement

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Test — Backend (Maven multi-module)
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test all services
        run: mvn package --no-transfer-progress

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            */target/*.jar
            !**/original-*.jar
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Test — Frontend (Node/Vite)
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080/api/v1

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Docker Build & Push (only on push to main or dev)
  # ─────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            dockerfile: eureka-server/Dockerfile
            context: .
          - service: api-gateway
            dockerfile: api-gateway/Dockerfile
            context: .
          - service: user-service
            dockerfile: user-service/Dockerfile
            context: .
          - service: supplier-service
            dockerfile: supplier-service/Dockerfile
            context: .
          - service: pr-service
            dockerfile: pr-service/Dockerfile
            context: .
          - service: po-service
            dockerfile: po-service/Dockerfile
            context: .
          - service: approval-service
            dockerfile: approval-service/Dockerfile
            context: .
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/procurement-system

            # Pull latest code
            git pull origin main

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull latest images and restart
            docker-compose pull
            docker-compose up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f

            echo "✅ Deployment complete — $(date)"
